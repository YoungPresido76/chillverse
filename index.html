    <!-- Structured data: helps Google associate a logo/name with the site -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Chillverse",
      "url": "https://chillverse.com.ng",
      "logo": "https://chillverse.com.ng/web-app-manifest-512x512.png",
      "description": "Chillverse is a Nigerian mobile-first social gaming platform for playing games, building XP and streaks, climbing leaderboards, and chatting with friends.",
      "founder": {
        "@type": "Person",
        "name": "Victor_vk",
        "jobTitle": "Founder & Developer",
        "sameAs": [
          "https://github.com/Victor-labs"
        ]
      }
    }
    </script>

    <!-- FAQ structured data: mirrors the FAQ section on the landing page -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Chillverse?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chillverse is a Nigerian mobile-first social gaming platform where you play fast-paced games, build XP and daily streaks, climb live leaderboards, chat with friends, and customise your profile with unlockable avatar skins from the in-app Mall."
          }
        },
        {
          "@type": "Question",
          "name": "Is Chillverse free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — Chillverse is completely free to join and play. Core features like games, streaks, leaderboards, chat, and profiles cost nothing. The Mall lets you optionally spend in-app diamonds on cosmetic avatar skins."
          }
        },
        {
          "@type": "Question",
          "name": "What games can I play on Chillverse?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chillverse has a growing library of quick-fire mini games, including Whot (the classic Nigerian card game) and Colour Block, with more titles being added regularly. Games support solo play and live multiplayer sessions."
          }
        },
        {
          "@type": "Question",
          "name": "How does XP and the streak system work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Every game you play earns XP, which levels up your account and moves you up the global leaderboard. Logging in and playing daily builds your streak — miss a day and your streak resets, so consistency matters."
          }
        },
        {
          "@type": "Question",
          "name": "Can I chat with friends on Chillverse?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Chillverse has real-time chat and crew features so you can message friends, trash talk during matches, and stay connected with your community directly in the app."
          }
        },
        {
          "@type": "Question",
          "name": "Does Chillverse have content for kids?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — Chillverse includes a dedicated kids video section with curated, family-friendly content, separate from the main gaming and social features."
          }
        },
        {
          "@type": "Question",
          "name": "How do I get started on Chillverse?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sign up for free at chillverse.com.ng, set up your profile, and jump straight into a game. You start earning XP and building your streak from your very first session."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
